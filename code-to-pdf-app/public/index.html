<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер кода в PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }
        
        .upload-area:hover,
        .upload-area.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #555;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            color: #888;
            font-size: 13px;
        }
        
        #fileInput {
            display: none;
        }
        
        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            display: none;
        }
        
        .file-name {
            color: #2e7d32;
            font-weight: 600;
            word-break: break-all;
        }
        
        .convert-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.5;
            pointer-events: none;
        }
        
        .convert-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .convert-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            margin-top: 15px;
            padding: 12px;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .supported-formats {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .formats-title {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .formats-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        
        .format-tag {
            background: #f0f2ff;
            color: #667eea;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Конвертер кода в PDF</h1>
        <p class="subtitle">Загрузите файл с кодом и получите его в формате PDF</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Перетащите файл сюда или кликните для выбора</div>
            <div class="upload-hint">Поддерживаются файлы с кодом (py, js, ts, html, css и др.)</div>
            <input type="file" id="fileInput" accept=".py,.js,.ts,.jsx,.tsx,.html,.css,.json,.xml,.yaml,.yml,.md,.txt,.sh,.bash,.zsh,.rb,.php,.go,.rs,.swift,.kt,.java,.c,.cpp,.h,.hpp,.cs,.sql,.r,.m,.lua,.pl,.pm">
        </div>
        
        <div class="file-info" id="fileInfo">
            <span class="file-name" id="fileName"></span>
        </div>
        
        <button class="convert-btn" id="convertBtn">
            Конвертировать в PDF
        </button>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="supported-formats">
            <div class="formats-title">Поддерживаемые форматы:</div>
            <div class="formats-list" id="formatsList">
                <!-- Форматы будут загружены динамически -->
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const convertBtn = document.getElementById('convertBtn');
        const errorMessage = document.getElementById('errorMessage');
        const formatsList = document.getElementById('formatsList');

        let selectedFile = null;

        // Загрузка поддерживаемых форматов
        async function loadSupportedFormats() {
            try {
                const response = await fetch('/api/supported-formats');
                const data = await response.json();
                formatsList.innerHTML = data.formats
                    .map(format => `<span class="format-tag">.${format}</span>`)
                    .join('');
            } catch (error) {
                console.error('Ошибка загрузки форматов:', error);
            }
        }

        loadSupportedFormats();

        // Обработчики drag & drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            fileInfo.style.display = 'block';
            convertBtn.classList.add('active');
            errorMessage.style.display = 'none';
        }

        // Конвертация файла
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const originalText = convertBtn.innerHTML;
            convertBtn.innerHTML = '<span class="loading"></span>Обработка...';
            convertBtn.disabled = true;
            errorMessage.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Ошибка конвертации');
                }

                // Скачивание PDF
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = selectedFile.name.replace(/\.[^/.]+$/, '') + '.pdf';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
            } finally {
                convertBtn.innerHTML = originalText;
                convertBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
